# nginx.conf — Production-hardened configuration
#
# Key production practices:
# 1. Security headers — prevent XSS, clickjacking, MIME-sniffing attacks
# 2. Gzip compression — smaller transfers = faster page loads
# 3. Cache-Control — static assets (JS/CSS) cached for 1 year (immutable),
#    index.html is NEVER cached so users always get the latest deployment
# 4. Proxy /api to json-server — frontend never knows the backend's real port

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=(), camera=()" always;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Asset Caching ───────────────────────────────────────────────────────
    # Vite fingerprints JS/CSS filenames on every build — cache them forever
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NEVER be cached — it's the entry point to new deployments
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA Fallback ────────────────────────────────────────────────────────
    # All unmatched routes go to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ───────────────────────────────────────────────────────────
    # Forwards /api/* requests to json-server — avoids CORS and exposes no ports
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Error Pages ─────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
